x-backend-env: &backend_env
  APP_SECRET_KEY: ${APP_SECRET_KEY}
  ENVIRONMENT: ${ENVIRONMENT}
  DEBUG: ${DEBUG}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  RABBITMQ_URL: ${RABBITMQ_URL}
  LLM_PROVIDER: ${LLM_PROVIDER}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_MODEL: ${OPENAI_MODEL}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL}
  RAG_TOP_K: ${RAG_TOP_K}
  RAG_CACHE_SECONDS: ${RAG_CACHE_SECONDS}
  SESSION_CACHE_SECONDS: ${SESSION_CACHE_SECONDS}
  LLM_CACHE_SECONDS: ${LLM_CACHE_SECONDS}
  UVICORN_WORKERS: ${UVICORN_WORKERS}
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *backend_env
    volumes:
      - vector_data:/app/data/vector_store
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *backend_env
    volumes:
      - vector_data:/app/data/vector_store
    command: >
      sh -c "python scripts/wait_for_services.py &&
      python scripts/build_vector_store.py &&
      celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2} -Q phoenix.ai"

  nginx:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  postgres_data:
  rabbitmq_data:
  vector_data:
